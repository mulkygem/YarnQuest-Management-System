{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card shadow-sm rounded-4">
      <div class="card-body p-4 text-center">
        <h3 class="mb-3">M-PESA Checkout</h3>
        <p class="text-muted">You are paying for: <strong>{{ item.name }}</strong></p>
        <h4 class="text-success mb-4">Amount: KES {{ item.price }}</h4>
        
        <form method="POST" action="{{ url_for('pay', item_id=item.id) }}">
          <div class="mb-3 text-start">
            <label class="form-label">M-PESA Phone Number</label>
            <input type="tel" name="phone_number" class="form-control" placeholder="e.g., 0712345678" required>
          </div>
          <button type="submit" class="btn btn-success btn-lg w-100">Send STK Push</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
