{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm border-0 rounded-4">
      <div class="card-body p-5">
        <h2 class="card-title mb-3">Create Your YarnQuest Account</h2>
        <p class="text-muted mb-4">Sign up as a crafter or vendor to access stock, prices, and vendor contact details.</p>
        <form method="POST">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="full_name" class="form-label">Full Name</label>
              <input type="text" name="full_name" class="form-control" id="full_name" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="email" class="form-label">Email</label>
              <input type="email" name="email" class="form-control" id="email" required>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="password" class="form-label">Password</label>
              <input type="password" name="password" class="form-control" id="password" required>
            </div>
            <div class="col-md-6 mb-3">
              <label for="role" class="form-label">Account Type</label>
              <select name="role" id="role" class="form-select" required>
                <option value="crafter">Crafter</option>
                <option value="vendor">Vendor</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label for="phone" class="form-label">Phone</label>
              <input type="text" name="phone" class="form-control" id="phone">
            </div>
            <div class="col-md-6 mb-3">
              <label for="location" class="form-label">Location</label>
              <input type="text" name="location" class="form-control" id="location" placeholder="Example: Nairobi, Mombasa">
            </div>
          </div>
          <div class="mb-3">
            <label for="contact_info" class="form-label">Contact Info</label>
            <input type="text" name="contact_info" class="form-control" id="contact_info" placeholder="Mpesa, WhatsApp, phone, etc.">
          </div>
          <button type="submit" class="btn btn-success w-100">Register</button>
        </form>
        <p class="mt-3 mb-0">Already registered? <a href="{{ url_for('login') }}">Login here</a>.</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
