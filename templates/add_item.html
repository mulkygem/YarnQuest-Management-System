{% extends 'layout.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h2 class="card-title mb-4">Add New Craft Supply</h2>
        <form method="POST">
          <div class="mb-3">
            <label class="form-label">Item Name</label>
            <input type="text" name="name" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" name="category" class="form-control" placeholder="Yarn, Hooks, Needles, Measuring Tape" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Price (KES)</label>
            <input type="number" step="0.01" name="price" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="url" name="image_url" class="form-control" placeholder="https://example.com/image.jpg">
          </div>
          <div class="mb-3">
            <label class="form-label">Shop Location</label>
            <input type="text" name="location" class="form-control" placeholder="Nairobi, Kibera, Mombasa">
          </div>
          <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea name="description" class="form-control" rows="3"></textarea>
          </div>
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" name="in_stock" id="in_stock" checked>
            <label class="form-check-label" for="in_stock">In Stock</label>
          </div>
          <button type="submit" class="btn btn-primary">Save Item</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
